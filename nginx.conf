server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip / Brotli — Bunny CDN dělá kompresi sám, ale když to běží přímo, hodí se to
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        application/octet-stream
        image/svg+xml;

    # Hashed Vite assets — long cache
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ffmpeg.wasm core soubory by se mohly v budoucnu hostit lokálně — long cache
    location ~* \.(wasm)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        types { application/wasm wasm; }
        try_files $uri =404;
    }

    # Hlavní SPA fallback — neexistující cesty rewritne na index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Bezpečnostní hlavičky
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self)" always;

    # Velikost uploadu (ffmpeg.wasm core ~30 MB, ale to je download, ne upload)
    client_max_body_size 50M;

    # Skrýt verzi nginxu
    server_tokens off;
}
