server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Komprese na originu VYPNUTÁ — Bunny CDN komprimuje sám na edgi.
    # Origin gzip + Vary: Accept-Encoding rozbíjel CDN variantní cache
    # (edge si uložil poškozené/zastaralé gzip varianty a serviroval je
    # všem prohlížečům, zatímco nekomprimované odpovědi byly v pořádku).
    gzip off;

    # Bezpečnostní hlavičky
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self)" always;
    server_tokens off;

    # ── Hashed Vite assets — dlouho cachované, immutable ──
    # POZOR: bez "always"! S "always" se max-age=1y přilepí i na 404 odpověď
    # a Bunny CDN edge si tu 404 zacachuje (stalo se během rolling updatu).
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # COEP i na worker chunk: dokument s COEP smí spustit dedicated worker
        # jen když jeho skript má kompatibilní COEP — jinak worker tiše selže
        # a ffmpeg.load() visí navěky (dev Vite posílá hlavičky globálně,
        # proto to lokálně fungovalo a v produkci ne).
        add_header Cross-Origin-Embedder-Policy "credentialless";
        add_header Cross-Origin-Opener-Policy "same-origin";
        error_page 404 = @notfound_nocache;
        try_files $uri =404;
    }

    # ── ffmpeg.wasm cores — dlouho cachované ──
    # /ffmpeg = multithreaded (potřebuje crossOriginIsolated), /ffmpeg-st = fallback
    location ~ ^/(ffmpeg|ffmpeg-st)/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Resource-Policy "cross-origin";
        add_header Cross-Origin-Embedder-Policy "credentialless";
        add_header Cross-Origin-Opener-Policy "same-origin";
        types { application/wasm wasm; application/javascript js; }
        error_page 404 = @notfound_nocache;
        try_files $uri =404;
    }

    # 404 na assetech NESMÍ být cachovaná — CDN by jinak držela chybu rok
    location @notfound_nocache {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-cache" always;
        return 404;
    }

    # ── index.html — NIKDY necachovat (jinak SPA serveruje staré JS hashe) ──
    # COOP/COEP: zapíná SharedArrayBuffer pro multithreaded ffmpeg.wasm core.
    # "credentialless" nechá načítat cross-origin zdroje (Bunny CDN, unpkg).
    # Musí být na KAŽDÉ location s add_header (nginx dědičnost: location-level
    # add_header ruší server-level).
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        # Bunny CDN respektuje CDN-Cache-Control
        add_header CDN-Cache-Control "no-cache" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header CDN-Cache-Control "no-cache" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
    }

    # ── Hlavní SPA fallback — neexistující cesty rewritne na index.html ──
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-cache" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
    }

    client_max_body_size 50M;
}
