server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        application/octet-stream
        image/svg+xml;

    # Bezpečnostní hlavičky
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self)" always;
    server_tokens off;

    # ── Hashed Vite assets — dlouho cachované, immutable ──
    # POZOR: bez "always"! S "always" se max-age=1y přilepí i na 404 odpověď
    # a Bunny CDN edge si tu 404 zacachuje (stalo se během rolling updatu).
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        error_page 404 = @notfound_nocache;
        try_files $uri =404;
    }

    # ── ffmpeg.wasm core files — dlouho cachované (verze v cestě garantuje konzistenci) ──
    location /ffmpeg/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Resource-Policy "cross-origin";
        types { application/wasm wasm; application/javascript js; }
        error_page 404 = @notfound_nocache;
        try_files $uri =404;
    }

    # 404 na assetech NESMÍ být cachovaná — CDN by jinak držela chybu rok
    location @notfound_nocache {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-cache" always;
        return 404;
    }

    # ── index.html — NIKDY necachovat (jinak SPA serveruje staré JS hashe) ──
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        # Bunny CDN respektuje CDN-Cache-Control
        add_header CDN-Cache-Control "no-cache" always;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header CDN-Cache-Control "no-cache" always;
    }

    # ── Hlavní SPA fallback — neexistující cesty rewritne na index.html ──
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-cache" always;
    }

    client_max_body_size 50M;
}
