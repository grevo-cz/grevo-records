name: Build & deploy to Bunny Magic Containers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ────────────────────────────────────────────────────────────────
  # SPA  (Vite build + nginx)
  # ────────────────────────────────────────────────────────────────
  spa:
    name: SPA · build & push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image name (lowercase)
        id: meta
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          REPO_LC="${REPO_NAME,,}"
          echo "image=$OWNER/$REPO_LC-spa" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image }}:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Bunny rolling update (SPA)
        if: ${{ vars.BUNNY_SPA_APP_ID != '' }}
        uses: BunnyWay/actions/container-update-image@main
        with:
          app_id: ${{ vars.BUNNY_SPA_APP_ID }}
          api_key: ${{ secrets.BUNNYNET_API_KEY }}
          container: ${{ vars.BUNNY_SPA_CONTAINER || 'app' }}
          image_tag: ${{ steps.meta.outputs.sha }}

  # ────────────────────────────────────────────────────────────────
  # Upload proxy  (Express)
  # ────────────────────────────────────────────────────────────────
  proxy:
    name: Proxy · build & push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image name (lowercase)
        id: meta
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          REPO_LC="${REPO_NAME,,}"
          echo "image=$OWNER/$REPO_LC-proxy" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image }}:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Bunny rolling update (proxy)
        if: ${{ vars.BUNNY_PROXY_APP_ID != '' }}
        uses: BunnyWay/actions/container-update-image@main
        with:
          app_id: ${{ vars.BUNNY_PROXY_APP_ID }}
          api_key: ${{ secrets.BUNNYNET_API_KEY }}
          container: ${{ vars.BUNNY_PROXY_CONTAINER || 'app' }}
          image_tag: ${{ steps.meta.outputs.sha }}
